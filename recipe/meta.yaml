{% set name = "django-cryptography-django5" %}
{% set version = "2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/chrisclark/django-cryptography/archive/{{ version }}.tar.gz
  sha256: a250af91c6d7b01845caa14eda65255323d1d9900358fcdd53c24945c8b382e6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 3

requirements:
  host:
    - python {{ python_min }}
    - django
    - setuptools >=40.8.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - django >=3.2
    - cryptography >=42.0
    - django-appconf

test:
  imports:
    - django_cryptography
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/chrisclark/django-cryptography
  summary: Easily encrypt data in Django - Fork for Django 5 support
  dev_url: https://github.com/chrisclark/django-cryptography
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
